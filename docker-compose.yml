services:
  db:
    image: postgres:13
    restart: always
    container_name: tiraduvidas_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: tiraduvidas_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped
    networks:
      - internal

  migrations:
    build:
      context: ./back-tiraduvidas
      dockerfile: Dockerfile.migrations
    container_name: tiraduvidas_migrations
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_TYPE: postgres
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_DATABASE: ${POSTGRES_DB}
      DATABASE_SYNCHRONIZE: "false"
      DATABASE_MAX_CONNECTIONS: 100
      DATABASE_SSL_ENABLED: "false"
      DATABASE_REJECT_UNAUTHORIZED: "false"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  api:
    build:
      context: ./back-tiraduvidas
      dockerfile: Dockerfile
    image: tiraduvidas-api:dev
    container_name: tiraduvidas_api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      APP_PORT: ${APP_PORT}
      APP_NAME: ${APP_NAME}
      API_PREFIX: ${API_PREFIX}
      
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_TYPE: ${DATABASE_TYPE}
      DATABASE_USERNAME: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_DATABASE: ${POSTGRES_DB}
      DATABASE_SYNCHRONIZE: "false"
      DATABASE_MAX_CONNECTIONS: 100
      DATABASE_SSL_ENABLED: "false"
      DATABASE_REJECT_UNAUTHORIZED: "false"
      
      RUN_MIGRATIONS: ${RUN_MIGRATIONS}
      REDIS_HOST: redis
      REDIS_PORT: 6379

      MAIL_MAILER: ${MAIL_MAILER:-resend}
      MAIL_FROM: ${MAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY}
      MAIL_DEFAULT_EMAIL: ${MAIL_DEFAULT_EMAIL}
      MAIL_DEFAULT_NAME: ${MAIL_DEFAULT_NAME}
    ports:
      - "8080:8080"
    expose:
      - "8080"
    volumes:
      - ./back-tiraduvidas:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    command: ["npm", "run", "start:dev"]
    networks:
      - internal

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
    image: tiraduvidas-frontend:dev
    container_name: tiraduvidas_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - api
    networks:
      - internal

volumes:
  db-data:
  redis_data:

networks:
  internal:
    driver: bridge
